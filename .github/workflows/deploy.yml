name: Terraform EKS CI/CD

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  TERRAFORM_DIR: terraform
  APP_DIR: apps
  K8S_DIR: k8s

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
          echo "EKS_CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Login to Amazon ECR
        run: |
          ECR_REGISTRY=$(echo $ECR_REPOSITORY_URL | cut -d'/' -f1)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker image
        run: |
          docker build -t myapp:${{ github.sha }} $APP_DIR
          docker tag myapp:${{ github.sha }} $ECR_REPOSITORY_URL:${{ github.sha }}
          docker tag myapp:${{ github.sha }} $ECR_REPOSITORY_URL:latest

      - name: Push Docker image to ECR
        run: |
          docker push $ECR_REPOSITORY_URL:${{ github.sha }}
          docker push $ECR_REPOSITORY_URL:latest

      - name: Replace image in Kubernetes deployment
        run: |
          sed -i "s|nginx:latest|$ECR_REPOSITORY_URL:${{ github.sha }}|g" $K8S_DIR/deployment.yml

      - name: Deploy app to EKS
        run: |
          kubectl apply -f $K8S_DIR/namespace.yml
          kubectl apply -f $K8S_DIR/deployment.yml
          kubectl apply -f $K8S_DIR/service.yml
          kubectl rollout status deployment/my-deployment -n application --timeout=300s

      - name: Show application service
        run: |
          kubectl get svc -n application

      - name: Install Prometheus and Grafana
        run: |
          chmod +x install-monitoring.sh
          ./install-monitoring.sh

      - name: Show monitoring services
        run: |
          kubectl get pods -n monitoring
          kubectl get svc -n monitoring
          
      - name: Wait 5 minutes before destroy
        if: always()
        run: |
          echo "Waiting 5 minutes before destroying infrastructure..."
          sleep 300
          
      - name: Cleanup Kubernetes resources before destroy
        if: always()
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME || true

          kubectl delete -f $K8S_DIR/service.yml --ignore-not-found=true || true
          kubectl delete -f $K8S_DIR/deployment.yml --ignore-not-found=true || true
          kubectl delete -f $K8S_DIR/namespace.yml --ignore-not-found=true || true

          helm uninstall kube-prometheus -n monitoring || true
          kubectl delete namespace monitoring --ignore-not-found=true || true

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform destroy -auto-approve
