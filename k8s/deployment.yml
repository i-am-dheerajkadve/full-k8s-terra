apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  namespace: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-application
          image: nginx:latest   # temporary image, GitHub Actions will replace this
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
